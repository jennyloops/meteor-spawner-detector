name: Build Mod

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Gradle 8.8
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp

      - name: Build
        run: /tmp/gradle-8.8/bin/gradle build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: spawner-detector-jar
          path: build/libs/*.jar
